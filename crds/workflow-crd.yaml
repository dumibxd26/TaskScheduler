# ─────────────────────────────────────────────────────────────────────────
# Workflow CRD — a DAG of tasks the user wants the cluster to run.
#
# This is the primary user-facing object. Users `kubectl apply` Workflow
# specs and watch them progress to FINISHED via `kubectl get workflows`.
# ─────────────────────────────────────────────────────────────────────────
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: workflows.ts.io
spec:
  group: ts.io
  scope: Namespaced
  names:
    kind: Workflow
    plural: workflows
    singular: workflow
    shortNames: [wf]
  versions:
    - name: v1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [tasks]
              properties:
                priority:
                  type: string
                  enum: [CRITICAL, REAL_TIME_HIGH, REAL_TIME_MEDIUM, BATCH, BEST_EFFORT]
                  default: BATCH
                preemptable:
                  type: boolean
                  default: true
                workflowClass:
                  type: string
                  enum: [BATCH, INTERACTIVE, PIPELINE, BURST]
                  default: BATCH
                tasks:
                  type: array
                  description: "List of task instances in this workflow."
                  items:
                    type: object
                    required: [name, template]
                    properties:
                      name:
                        type: string
                        description: "Local name within this workflow (e.g. 'ingest')."
                      template:
                        type: string
                        description: "Name of the TaskTemplate CRD to use."
                      dependsOn:
                        type: array
                        items:
                          type: object
                          required: [parent]
                          properties:
                            parent:
                              type: string
                              description: "Parent task name within this workflow."
                            dependencyType:
                              type: string
                              enum: [DATA, EXECUTION]
                              default: DATA
                            dataFields:
                              type: array
                              items: { type: string }
                              description: "Output fields produced by the parent that this task consumes."
            status:
              type: object
              properties:
                state:
                  type: string
                  enum: [QUEUED, ADMITTED, RUNNING, FINISHED, FAILED]
                tasksTotal:
                  type: integer
                tasksFinished:
                  type: integer
                tasksFailed:
                  type: integer
                startedAt:
                  type: string
                finishedAt:
                  type: string
                tasks:
                  type: array
                  items:
                    type: object
                    properties:
                      name:        { type: string }
                      state:       { type: string }
                      podName:     { type: string }
                      nodeName:    { type: string }
                      startedAt:   { type: string }
                      finishedAt: { type: string }
                      runtimeSeconds:
                        type: number
                        format: float
                message:
                  type: string
      additionalPrinterColumns:
        - name: State
          type: string
          jsonPath: .status.state
        - name: Ready
          type: string
          description: "Finished/Total"
          jsonPath: .status.tasksFinished
        - name: Total
          type: integer
          jsonPath: .status.tasksTotal
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
