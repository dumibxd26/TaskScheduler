worker_processes auto;
events { worker_connections 1024; }

http {
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 30;
    types_hash_max_size 4096;
    default_type application/octet-stream;

    server {
        listen 8080 default_server;

        # Producer-local data plane root. Each task writes outputs into
        # /srv/data/<workflow-id>/<pod-name>/<field>.* on its own node; the
        # fileserver DaemonSet on every node exposes that node's tree on
        # http://<node-ip>:8080/.
        root /srv/data;

        # Directory autoindex lets a peer GET the listing for discovery.
        autoindex on;

        # Don't cache — outputs change as workflows progress.
        add_header Cache-Control "no-store";

        # Liveness / readiness probe.
        location = /healthz {
            access_log off;
            return 200 "ok\n";
        }

        location / {
            try_files $uri $uri/ =404;
        }
    }
}
