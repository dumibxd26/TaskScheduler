---
# 1. Create a dedicated Service Account for your Brain
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ts-scheduler-sa
  namespace: default

---
# 2. Give it permissions to watch Pods, read Nodes, and create Bindings
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ts-scheduler-role
rules:
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch", "update", "patch"]
- apiGroups: [""]
  resources: ["pods/binding"]
  verbs: ["create"]
- apiGroups: [""]
  resources: ["pods/log"]
  verbs: ["get"]
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "create", "update", "replace"]

---
# 3. Bind the Role to the Service Account
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ts-scheduler-role-binding
subjects:
- kind: ServiceAccount
  name: ts-scheduler-sa
  namespace: default
roleRef:
  kind: ClusterRole
  name: ts-scheduler-role
  apiGroup: rbac.authorization.k8s.io

---
# 4. Deploy the Brain!
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ts-scheduler
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ts-scheduler
  template:
    metadata:
      labels:
        app: ts-scheduler
    spec:
      serviceAccountName: ts-scheduler-sa # Use our God Mode account
      containers:
      - name: scheduler
        image: ts-scheduler:latest
        imagePullPolicy: Never # Forces K8s to use the local image we loaded
        env:
        - name: TS_PROFILE_PATH
          value: /data/profiles_learned.json
        volumeMounts:
        - name: profile-storage
          mountPath: /data
      volumes:
      - name: profile-storage
        hostPath:
          path: /profiles
          type: DirectoryOrCreate