# ─────────────────────────────────────────────────────────────────────────
# ts-thermal — one Pod per node. Reads CPU temperature from the host's
# /sys/class/thermal and publishes it as a Node annotation that the
# scheduler's ThermalCollector reads.
# ─────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: ts-thermal
  namespace: ts-system
  labels:
    app.kubernetes.io/name: ts-thermal
    app.kubernetes.io/component: telemetry
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: ts-thermal
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ts-thermal
        app.kubernetes.io/component: telemetry
    spec:
      serviceAccountName: ts-thermal
      tolerations:
        - operator: Exists
      containers:
        - name: collector
          image: ts-thermal:v1
          imagePullPolicy: IfNotPresent
          env:
            - name: TS_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: TS_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: TS_THERMAL_INTERVAL_S
              value: "30"
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
          volumeMounts:
            - name: host-sys
              mountPath: /host/sys
              readOnly: true
      volumes:
        - name: host-sys
          hostPath:
            path: /sys
            type: Directory
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ts-thermal
  namespace: ts-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ts-thermal
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ts-thermal
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ts-thermal
subjects:
  - kind: ServiceAccount
    name: ts-thermal
    namespace: ts-system
